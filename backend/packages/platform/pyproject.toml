[project]
name = "wellbe-platform"
version = "0.1.0"
requires-python = ">=3.13"
description = "Cross-cutting concerns: config, logging, tracing, PHI scrubbing. Never imports component implementations."
dependencies = [
    "pydantic>=2.10",
    "pydantic-settings>=2.7",
    "opentelemetry-api>=1.29",
    "opentelemetry-sdk>=1.29",
    "structlog>=24.4",
]
