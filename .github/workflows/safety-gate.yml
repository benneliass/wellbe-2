name: Safety Gate CI

on:
  pull_request:
    paths:
      - "backend/packages/c10_safety/**"
      - "backend/apps/safety-gate/**"
      - "evals/safety/**"
      - "docs/safety/**"
      - ".cursor/rules/wellbe-vision-guardrails.mdc"
      - ".cursor/rules/audience-guardrails.mdc"

jobs:
  safety-eval:
    name: Safety Evaluation Harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-packages

      - name: Run safety evaluation harness
        working-directory: evals/safety
        run: |
          echo "TODO: implement safety eval suite (WB-DEV-205)"
          echo "Must pass: do-not-diagnose / panic / provenance regression suite"
          echo "Zero false-negatives required. Any failure blocks merge."
          # uv run pytest tests/ -v --tb=short
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
