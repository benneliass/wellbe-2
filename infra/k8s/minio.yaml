apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: wellbe
spec:
  type: ClusterIP
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: wellbe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              value: "wellbe_minio"
            - name: MINIO_ROOT_PASSWORD
              value: "wellbe_minio_dev"
          ports:
            - containerPort: 9000
            - containerPort: 9001
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: wellbe
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q -O /dev/null http://minio:9000/minio/health/live; do
                echo "waiting for minio..."
                sleep 2
              done
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - sh
            - -c
            - |
              mc alias set local http://minio:9000 wellbe_minio wellbe_minio_dev
              mc mb --ignore-existing local/wellbe-raw-context
              mc mb --ignore-existing local/wellbe-documents
              echo "MinIO buckets ready"
