apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-writer-config
  namespace: wellbe
data:
  WELLBE_DATABASE_URL: "postgresql+asyncpg://wellbe:wellbe_dev@postgres:5432/wellbe"
  WELLBE_S3_ENDPOINT: "http://minio:9000"
  WELLBE_S3_ACCESS_KEY: "wellbe_minio"
  WELLBE_S3_SECRET_KEY: "wellbe_minio_dev"
  WELLBE_S3_BUCKET_RAW: "wellbe-raw-context"
  WELLBE_REDIS_URL: "redis://redis:6379/0"
  WELLBE_LOG_LEVEL: "INFO"
  WELLBE_ENVIRONMENT: "dev"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ingestion-worker-config
  namespace: wellbe
data:
  WELLBE_VAULT_WRITER_URL: "http://vault-writer:8002"
  WELLBE_REDIS_URL: "redis://redis:6379/0"
  WELLBE_LOG_LEVEL: "INFO"
  WELLBE_ENVIRONMENT: "dev"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: wellbe
data:
  01_extensions.sql: |
    CREATE EXTENSION IF NOT EXISTS vector;
    CREATE EXTENSION IF NOT EXISTS timescaledb;
    CREATE EXTENSION IF NOT EXISTS age;
    LOAD 'age';
    SET search_path = ag_catalog, "$user", public;
    CREATE DATABASE zitadel;
