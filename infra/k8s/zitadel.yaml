apiVersion: v1
kind: Service
metadata:
  name: zitadel
  namespace: wellbe
spec:
  type: ClusterIP
  selector:
    app: zitadel
  ports:
    - port: 8090
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zitadel
  namespace: wellbe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zitadel
  template:
    metadata:
      labels:
        app: zitadel
    spec:
      containers:
        - name: zitadel
          image: ghcr.io/zitadel/zitadel:latest
          command: ["zitadel"]
          args:
            - start-from-init
            - --masterkey
            - "MasterkeyNeedsToHave32Characters"
            - --tlsMode
            - disabled
          env:
            - name: ZITADEL_DATABASE_POSTGRES_HOST
              value: "postgres"
            - name: ZITADEL_DATABASE_POSTGRES_PORT
              value: "5432"
            - name: ZITADEL_DATABASE_POSTGRES_DATABASE
              value: "zitadel"
            - name: ZITADEL_DATABASE_POSTGRES_USER_USERNAME
              value: "wellbe"
            - name: ZITADEL_DATABASE_POSTGRES_USER_PASSWORD
              value: "wellbe_dev"
            - name: ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE
              value: "disable"
            - name: ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME
              value: "wellbe"
            - name: ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD
              value: "wellbe_dev"
            - name: ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE
              value: "disable"
            - name: ZITADEL_EXTERNALSECURE
              value: "false"
            - name: ZITADEL_EXTERNALPORT
              value: "8090"
            - name: ZITADEL_EXTERNALDOMAIN
              value: "localhost"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /debug/ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /debug/healthz
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
