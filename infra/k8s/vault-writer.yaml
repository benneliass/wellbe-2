apiVersion: v1
kind: Service
metadata:
  name: vault-writer
  namespace: wellbe
spec:
  type: ClusterIP
  selector:
    app: vault-writer
  ports:
    - port: 8002
      targetPort: 8002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-writer
  namespace: wellbe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault-writer
  template:
    metadata:
      labels:
        app: vault-writer
    spec:
      containers:
        - name: vault-writer
          image: wellbe-vault-writer:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: vault-writer-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 10
