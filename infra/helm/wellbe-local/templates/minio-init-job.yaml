apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  labels:
    {{- include "wellbe-local.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q -O /dev/null http://minio:9000/minio/health/live; do
                echo "waiting for minio..."
                sleep 2
              done
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - sh
            - -c
            - |
              mc alias set local http://minio:9000 {{ .Values.minio.rootUser }} {{ .Values.minio.rootPassword }}
              {{- range .Values.minio.buckets }}
              mc mb --ignore-existing --with-lock local/{{ . }}
              {{- end }}
              echo "MinIO buckets ready"
