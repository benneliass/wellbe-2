namespace: wellbe

postgres:
  image: wellbe-postgres:local
  imagePullPolicy: Never
  user: wellbe
  password: wellbe_dev
  database: wellbe
  storage: 1Gi

redis:
  image: redis:7-alpine
  port: 6379

minio:
  image: minio/minio:latest
  rootUser: wellbe_minio
  rootPassword: wellbe_minio_dev
  buckets:
    - wellbe-raw-context-locked
    - wellbe-documents

zitadel:
  image: ghcr.io/zitadel/zitadel:latest
  masterkey: "MasterkeyNeedsToHave32Characters"
  externalPort: 8090
  externalDomain: localhost

migration:
  image: wellbe-migrations:local
  imagePullPolicy: Never

# Temporal server (all-in-one auto-setup) for C9 durable timers. Persistence is
# backed by the existing Postgres in SEPARATE databases (temporal /
# temporal_visibility) so Temporal state never mixes with WellBe app schemas.
# Internal-only: ClusterIP service on 7233, no ingress / public exposure.
temporal:
  image: temporalio/auto-setup:1.25.1
  imagePullPolicy: IfNotPresent
  frontendPort: 7233
  namespace: default
  db: temporal
  visibilityDb: temporal_visibility

continuityWorker:
  image: wellbe-continuity-worker:local
  imagePullPolicy: Never
  replicas: 1
  config:
    temporalHost: "temporal:7233"
    temporalNamespace: "default"
    logLevel: "INFO"
    environment: "dev"

vaultWriter:
  image: wellbe-vault-writer:local
  imagePullPolicy: Never
  port: 8002
  replicas: 1
  config:
    # DB URL is rendered from the canonical postgres.* values via the
    # "wellbe-local.databaseUrlAsync" helper — do not duplicate the credential here.
    s3Endpoint: "http://minio:9000"
    s3AccessKey: "wellbe_minio"
    s3SecretKey: "wellbe_minio_dev"
    s3BucketRaw: "wellbe-raw-context-locked"
    s3ObjectLockRetentionDays: "365"
    redisUrl: "redis://wellbe-redis:6379/0"
    logLevel: "INFO"
    environment: "dev"

ingestionWorker:
  image: wellbe-ingestion-worker:local
  imagePullPolicy: Never
  port: 8003
  replicas: 1
  config:
    vaultWriterUrl: "http://vault-writer:8002"
    redisUrl: "redis://wellbe-redis:6379/0"
    logLevel: "INFO"
    environment: "dev"

processingWorker:
  image: wellbe-processing-worker:local
  imagePullPolicy: Never
  port: 8004
  replicas: 1
  config:
    # DB URL is rendered from the canonical postgres.* values via the
    # "wellbe-local.databaseUrlAsync" helper — do not duplicate the credential here.
    redisUrl: "redis://wellbe-redis:6379/0"
    temporalHost: "temporal:7233"
    logLevel: "INFO"
    environment: "dev"

safetyGate:
  image: wellbe-safety-gate:local
  imagePullPolicy: Never
  port: 8005
  replicas: 1
  config:
    logLevel: "INFO"
    environment: "dev"

api:
  image: wellbe-api:local
  imagePullPolicy: Never
  port: 8001
  replicas: 1
  config:
    logLevel: "INFO"
    environment: "dev"

auditService:
  image: wellbe-audit-service:local
  imagePullPolicy: Never
  port: 8006
  replicas: 1
  config:
    logLevel: "INFO"
    environment: "dev"
